version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seminar_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-seminar_papers}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: seminar_server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-seminar_papers}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      UPLOAD_BASE_PATH: /app/uploads
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
    volumes:
      - uploads:/app/uploads

  client:
    build: ./client
    container_name: seminar_client
    restart: always
    depends_on:
      - server
    ports:
      - "${PORT:-80}:80"

volumes:
  pgdata:
  uploads:
