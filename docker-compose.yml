version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seminar_postgres
    environment:
      POSTGRES_DB: seminar_papers
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
